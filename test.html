<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Test de Dominio IA · IA &amp; Wine Buenos Aires — STANNUM</title>
<meta name="theme-color" content="#050505" />
<meta name="description" content="Diagnóstico ejecutivo del nivel real de adopción de IA en tu rol y tu equipo. 17 preguntas, 5 minutos, resultado inmediato. Camino al encuentro IA & Wine Buenos Aires." />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#050505; --black-2:#0b0b0a;
  --gold:#c58b31; --gold-soft:#f1c56d; --champagne:#f2eee6;
  --silver:#d8d8d8; --muted:#9a9286;
  --line:rgba(197,139,49,.34); --line-soft:rgba(255,255,255,.10);
  --fd:"Arial Narrow","Roboto Condensed","Segoe UI",Arial,sans-serif;
  --fb:"Segoe UI",Arial,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--champagne);font-family:var(--fb);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.55}
a{color:inherit;text-decoration:none}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(197,139,49,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(197,139,49,.035) 1px,transparent 1px);
  background-size:64px 64px;mask-image:radial-gradient(ellipse at 50% 0%,#000 30%,transparent 80%)}
.glow{position:fixed;top:-200px;right:-120px;width:520px;height:520px;z-index:0;pointer-events:none;
  background:radial-gradient(circle,rgba(197,139,49,.16),transparent 62%)}
.top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;background:rgba(5,5,5,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand-tx{font-family:var(--fd);font-weight:900;font-size:18px;letter-spacing:.18em;text-transform:uppercase}
.brand-tx span{color:var(--gold)}
.top-eyebrow{font-size:10px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.score-badge{font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.score-badge b{font-family:var(--fd);font-weight:900;color:var(--gold-soft);font-size:18px}
.progress{position:fixed;top:63px;left:0;right:0;z-index:49;height:2px;background:rgba(255,255,255,.05)}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .5s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(197,139,49,.6)}
.stage{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:120px 28px 80px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.eyebrow{font-size:12px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:20px;font-weight:800}
.eyebrow::before{content:'';width:32px;height:1px;background:var(--gold)}
.q-index{margin-left:auto;color:var(--muted);font-weight:600}
.q-title{font-family:var(--fd);font-weight:900;font-size:clamp(30px,5vw,54px);line-height:1.04;margin-bottom:34px;letter-spacing:.01em;text-transform:uppercase}
.q-title .hl{color:var(--gold)}
.field input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);
  color:var(--champagne);font-family:var(--fb);font-size:clamp(19px,2.6vw,28px);font-weight:500;padding:14px 2px;outline:none;transition:border-color .25s}
.field input::placeholder{color:rgba(154,146,134,.6)}
.field input:focus{border-color:var(--gold-soft)}
.chips{display:flex;flex-wrap:wrap;gap:12px}
.chip{font-size:15px;font-weight:500;color:var(--silver);padding:13px 22px;border:1px solid var(--line);border-radius:999px;
  background:rgba(197,139,49,.02);cursor:pointer;transition:all .2s;user-select:none}
.chip:hover{border-color:rgba(197,139,49,.6);color:#fff}
.chip.sel{background:var(--gold);color:#1a1206;border-color:var(--gold);font-weight:700}
.cards{display:grid;gap:12px}
.card{text-align:left;border:1px solid var(--line);background:rgba(197,139,49,.03);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transform-origin:top;transition:transform .3s}
.card:hover{border-color:rgba(197,139,49,.6);background:rgba(197,139,49,.06)}
.card:hover::before{transform:scaleY(1)}
.card.sel{border-color:var(--gold);background:rgba(197,139,49,.12)}
.card.sel::before{transform:scaleY(1)}
.card-l{font-size:16.5px;font-weight:600;color:#fff;margin-bottom:2px}
.card-s{font-size:13px;color:var(--muted)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:42px;gap:16px}
.back{font-size:12px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;cursor:pointer;background:none;border:none;transition:color .2s;font-weight:600}
.back:hover{color:#fff}
.btn{font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:1px solid var(--gold);
  color:var(--gold-soft);background:transparent;padding:14px 34px;border-radius:999px;transition:all .25s}
.btn:hover:not(:disabled){background:var(--gold);color:#1a1206;box-shadow:0 0 28px rgba(197,139,49,.35)}
.btn:disabled{opacity:.35;cursor:not-allowed;border-color:var(--line);color:var(--muted)}
.btn-skip{margin-right:14px;border:none;color:var(--muted);background:none;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
.btn-skip:hover{color:#fff}
.nav-actions{display:flex;align-items:center}
.splash{text-align:center;align-items:center}
.splash .tag{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:8px 18px;margin:0 auto 28px;font-weight:700}
.splash h1{font-family:var(--fd);font-weight:900;font-size:clamp(40px,9vw,88px);line-height:.94;letter-spacing:.01em;margin-bottom:24px;text-transform:uppercase}
.splash h1 .hl{color:var(--gold)}
.splash p{max-width:620px;margin:0 auto 40px;font-size:clamp(15px,2vw,18px);color:var(--silver);line-height:1.7}
.splash .meta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:34px;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.splash .meta span{border:1px solid var(--line-soft);border-radius:999px;padding:8px 16px}
.btn-big{font-size:15px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:none;
  background:linear-gradient(135deg,#f2c56f,#b97921 55%,#f6d78a);color:#1a1206;padding:18px 50px;border-radius:999px;transition:all .25s;box-shadow:0 0 36px rgba(197,139,49,.28)}
.btn-big:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(197,139,49,.4)}
.calc{text-align:center;align-items:center}
.calc .ring{width:120px;height:120px;border:2px solid rgba(197,139,49,.18);border-top-color:var(--gold);border-radius:50%;margin:0 auto 30px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.calc h2{font-family:var(--fd);font-weight:900;font-size:28px;margin-bottom:10px;text-transform:uppercase}
.calc p{color:var(--muted);font-size:14px;letter-spacing:.08em}
.result{padding-top:110px}
.res-head{text-align:center;margin-bottom:40px}
.res-head .eyebrow{justify-content:center}
.res-head .eyebrow::before{display:none}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0 26px}
.gauge{position:relative;width:300px;max-width:80vw}
.gauge .num{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);text-align:center}
.gauge .num b{font-family:var(--fd);font-weight:900;font-size:54px;color:var(--gold-soft);line-height:1}
.gauge .num small{display:block;font-size:11px;letter-spacing:.2em;color:var(--muted);margin-top:2px}
.level-name{font-family:var(--fd);font-weight:900;font-size:clamp(34px,7vw,62px);text-align:center;line-height:1;margin-bottom:8px;text-transform:uppercase}
.level-name .hl{color:var(--gold)}
.level-tag{text-align:center;font-size:12px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:30px;font-weight:700}
.res-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border-radius:16px;padding:28px 30px;margin-bottom:16px}
.res-card .k{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;font-weight:700}
.res-desc{font-size:16px;line-height:1.7;color:#ddd6c9}
.sol-name{font-family:var(--fd);font-weight:900;font-size:24px;color:var(--gold-soft);margin-bottom:8px;text-transform:uppercase}
.sol-d{font-size:15px;line-height:1.65;color:var(--muted)}
.src{font-size:12px;color:var(--muted);margin-top:14px;letter-spacing:.02em}
.cta-final{text-align:center;margin-top:30px;padding:38px 28px;border:1px solid var(--line);border-radius:18px;
  background:radial-gradient(ellipse at center,rgba(197,139,49,.1),transparent 70%)}
.cta-final h3{font-family:var(--fd);font-weight:900;font-size:clamp(24px,4vw,38px);line-height:1.05;margin-bottom:14px;text-transform:uppercase}
.cta-final h3 .hl{color:var(--gold)}
.cta-final p{color:var(--silver);font-size:15px;line-height:1.6;max-width:520px;margin:0 auto 24px}
.ok-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(197,139,49,.12);border:1px solid var(--line);color:var(--gold-soft);
  font-weight:700;font-size:14px;letter-spacing:.04em;padding:14px 26px;border-radius:999px}
.wa-btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#f2c56f,#b97921 55%,#f6d78a);color:#1a1206;font-weight:800;font-size:15px;letter-spacing:.06em;padding:18px 40px;border-radius:999px;transition:all .25s}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(197,139,49,.4)}
.email-note{margin-top:22px;font-size:13px;color:var(--muted);letter-spacing:.02em}
.email-note b{color:var(--champagne)}
.bars{display:grid;gap:14px;margin-top:4px}
.bar-row{display:grid;gap:6px}
.bar-row .bl{display:flex;justify-content:space-between;font-size:13px;color:var(--silver)}
.bar-row .bl span:last-child{color:var(--gold-soft);font-weight:700}
.bar-track{height:7px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#b97921,var(--gold-soft));border-radius:99px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.hidden{display:none!important}
.fade{animation:fade .45s ease both}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media(max-width:560px){.top{padding:14px 18px}.stage{padding:104px 18px 64px}.top-eyebrow{display:none}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>

<header class="top">
  <a class="brand" href="index.html" aria-label="STANNUM"><div class="brand-tx">STAN<span>NUM</span></div></a>
  <div class="top-eyebrow">IA &amp; Wine Buenos Aires · Test de Dominio IA</div>
  <div class="score-badge">Score <b id="scoreLive">0</b></div>
</header>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<main id="app"></main>

<script>
// ====================== CONFIG ======================
const CONFIG = {
  // Pegá acá la URL del Web App de Apps Script cuando esté deployado (ver form-apps-script.gs).
  APPS_SCRIPT_URL: "",
  WHATSAPP: "",                       // opcional: número solo dígitos. Vacío = oculta el botón de WhatsApp.
  EMAIL: "comercial@stannum.com.ar",
  EVENT: "IA & Wine Buenos Aires"
};

// ====================== PREGUNTAS (mismas que el test de Summit Tucumán) ======================
const QUESTIONS = [
  {id:"name",  type:"text", sec:"Tu perfil", eye:"01 · Perfil", q:"¿Cómo te llamás?", ph:"Nombre y apellido", req:true},
  {id:"company",type:"text",sec:"Tu perfil", eye:"02 · Perfil", q:"¿En qué empresa trabajás?", ph:"Nombre de la empresa", req:true},
  {id:"role",  type:"text", sec:"Tu perfil", eye:"03 · Perfil", q:"¿Cuál es tu rol y función central?", ph:"Ej. Director Comercial", req:true},
  {id:"email", type:"text", sec:"Tu perfil", eye:"04 · Perfil", q:"¿Cuál es tu email?", ph:"nombre@empresa.com", req:true, email:true},
  {id:"phone", type:"text", sec:"Tu perfil", eye:"05 · Perfil", q:"¿Y tu número de WhatsApp?", ph:"+54 9 11 0000-0000", opt:true},

  {id:"team", type:"chips", single:true, sec:"Tu equipo", eye:"06 · Equipo", q:"¿Cuántas personas conforman tu equipo?",
    opts:["Solo yo","1 a 5","6 a 20","21 a 100","Más de 100"]},
  {id:"time", type:"cards", sec:"Tu equipo", eye:"07 · Equipo", q:"¿Cómo distribuís tu tiempo laboral?",
    opts:[
      {l:"80% operativo · 20% planificación", s:"Foco principal en ejecución."},
      {l:"60% operativo · 40% planificación", s:"Mayoría en ejecución con algo de estrategia."},
      {l:"50% operativo · 50% planificación", s:"Equilibrio entre ejecución y estrategia."},
      {l:"30% operativo · 70% planificación", s:"Mayoría en dirección y estrategia."},
      {l:"10% operativo · 90% planificación", s:"Rol principalmente estratégico."}
    ]},

  {id:"freq", type:"cards", scoreable:true, sec:"Uso de IA", eye:"08 · IA", q:"¿Con qué frecuencia usás herramientas de IA generativa?",
    opts:[
      {l:"Nunca", s:"Todavía no empecé.", v:0},
      {l:"Ocasionalmente", s:"1-2 veces por semana.", v:20},
      {l:"Regularmente", s:"3-4 veces por semana.", v:50},
      {l:"A diario", s:"Todos los días, en varias tareas.", v:75},
      {l:"Todo el tiempo", s:"Es parte central de mi forma de trabajar.", v:100}
    ]},
  {id:"plats", type:"chips", multi:true, sec:"Uso de IA", eye:"09 · IA", q:"¿Qué plataformas de IA usás?",
    opts:["ChatGPT","Claude","Gemini","Copilot","Perplexity","Grok","Midjourney","Otra","Ninguna"]},
  {id:"pago", type:"chips", single:true, req:true, sec:"Uso de IA", eye:"10 · IA", q:"¿Pagás por alguna herramienta de IA?",
    opts:["Sí, tengo plan pago","No, solo uso versiones gratuitas"]},
  {id:"areas", type:"chips", multi:true, sec:"Uso de IA", eye:"11 · IA", q:"¿En qué áreas usás IA?",
    opts:["Redacción y contenido","Análisis de datos","Automatización de tareas","Desarrollo de estrategias","Atención al cliente","Programación y código","Planificación y organización","Comunicación y emails","Resolución de problemas","Toma de decisiones","Generación de imágenes","Investigación y búsqueda"]},
  {id:"reaccion", type:"cards", scoreable:true, sec:"Uso de IA", eye:"12 · IA", q:"¿Qué hacés cuando la IA no te da lo que esperabas?",
    opts:[
      {l:"La dejo y lo hago yo", s:"Uso la IA como último recurso.", v:0},
      {l:"Repito la pregunta de otra manera", s:"Sin metodología clara, a prueba y error.", v:25},
      {l:"Reformulo con más contexto", s:"Sé que el prompt hace la diferencia.", v:65},
      {l:"Descompongo el problema en partes", s:"Metodología sistemática para iterar.", v:100}
    ]},
  {id:"integracion", type:"cards", scoreable:true, sec:"Uso de IA", eye:"13 · IA", q:"¿Integraste la IA en algún proceso de tu equipo o empresa?",
    opts:[
      {l:"Solo yo la uso", s:"Adopción individual.", v:0},
      {l:"Comparto resultados, pero cada uno hace lo suyo", s:"Adopción parcial sin proceso.", v:25},
      {l:"1-2 procesos del equipo ya usan IA", s:"Integración inicial en marcha.", v:60},
      {l:"Varios procesos y flujos del equipo la incorporan", s:"Transformación organizacional.", v:100}
    ]},

  {id:"funciones", type:"chips", multi:true, sec:"Conocimiento", eye:"14 · Conocimiento", q:"¿Qué funciones avanzadas usás en IA generativa?",
    opts:["Análisis de archivos","Búsqueda web","Generación de imágenes","Generación de código","Agentes propios","Automatización","Deep Research","Memoria persistente","Integración con apps","Instrucciones personalizadas"]},
  {id:"conceptos", type:"chips", multi:true, sec:"Conocimiento", eye:"15 · Conocimiento", q:"¿Cuáles de estos conceptos te resultan familiares?",
    opts:["Prompt engineering","Machine Learning","Redes neuronales","LLM (Large Language Model)","Procesamiento de Lenguaje Natural","Agentes de IA","RAG (Retrieval-Augmented Generation)","IA General (AGI)","Tokens y contexto"]},
  {id:"aprender", type:"chips", multi:true, sec:"Conocimiento", eye:"16 · Conocimiento", q:"¿Qué aspectos de la IA querés mejorar o aprender?",
    opts:["Creación de prompts efectivos","Automatización de procesos con IA","Integración de IA en mi equipo","Análisis de datos con IA","Estrategias comerciales con IA","Agentes y workflows autónomos","Medición de impacto del uso de IA","Governance y uso ético de IA","Desarrollo de productos con IA"]},

  {id:"nivel", type:"cards", scoreable:true, sec:"Diagnóstico", eye:"17 · Diagnóstico", q:"¿Cuál es tu nivel de dominio en IA generativa?",
    opts:[
      {l:"Principiante", s:"Apenas estoy explorando sus funciones.", v:15},
      {l:"Intermedio", s:"Uso IA regularmente para tareas específicas.", v:45},
      {l:"Avanzado", s:"Optimizo tareas y diseño prompts personalizados.", v:75},
      {l:"Experto", s:"Automatizo procesos y optimizo estrategias empresariales.", v:100}
    ]}
];

const LEVELS = [
  {min:0,  max:34,  n:1, name:"Principiante", tag:"Etapa inicial de exploración",
   desc:"Estás en las primeras etapas del uso de IA generativa. La oportunidad es construir una base práctica con casos de uso reales que generen impacto inmediato en tu operación. Es el primer tramo del roadmap hacia una FRONTIER FIRM (Microsoft, Work Trend Index 2025).",
   sol:"TRENNO iA Starter", solD:"Programa de alfabetización ejecutiva con casos de uso aplicados, prompts prácticos y rutinas de adopción para líderes y equipos."},
  {min:35, max:59,  n:2, name:"Intermedio", tag:"Uso regular con potencial de escala",
   desc:"Usás IA de forma regular para tareas específicas. El siguiente paso es sistematizar ese uso, ampliar herramientas y comenzar a medir el impacto concreto en el negocio.",
   sol:"TRENNO iA Starter", solD:"Capacitación aplicada por área con metodología de prompts avanzados, automatización básica y métricas de adopción."},
  {min:60, max:79,  n:3, name:"Avanzado", tag:"Optimización y diseño de sistemas",
   desc:"Optimizás tareas con IA y diseñás prompts personalizados. El siguiente nivel es integrar IA como sistema operativo del equipo con flujos automatizados y gobierno claro.",
   sol:"TRENNO iA Enterprise", solD:"Implementación sistémica con SOPs, automatizaciones conectadas, entrenamiento de equipos y tablero de control de impacto."},
  {min:80, max:100, n:4, name:"Experto", tag:"IA como ventaja estratégica",
   desc:"Usás IA para automatizar procesos y optimizar estrategias. El foco es el gobierno, la escalabilidad organizacional y el roadmap de IA como ventaja competitiva — el tramo final hacia la FRONTIER FIRM (Microsoft, Work Trend Index 2025).",
   sol:"TRENNO iA Agentic", solD:"Diseño de agentes y workflows autónomos, gobierno de IA y roadmap estratégico para escalar la organización."}
];

// ====================== ESTADO ======================
const answers = {};
let step = -1;
const app = document.getElementById('app');
const progressBar = document.getElementById('progressBar');
const scoreLive = document.getElementById('scoreLive');

function liveScore(){
  const sc = QUESTIONS.filter(q=>q.scoreable);
  const vals = sc.map(q=>{ const a=answers[q.id]; if(a==null) return null; const o=q.opts.find(o=>o.l===a); return o?o.v:null; }).filter(v=>v!=null);
  if(!vals.length) return 0;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function levelFor(s){ return LEVELS.find(l=>s>=l.min && s<=l.max) || LEVELS[0]; }
function setProgress(){
  const pct = step<0 ? 0 : Math.round((step/QUESTIONS.length)*100);
  progressBar.style.width = pct+'%';
  scoreLive.textContent = liveScore();
}

// ====================== RENDER ======================
function renderSplash(){
  app.innerHTML = `
  <section class="stage splash fade">
    <div class="tag">STANNUM · Diagnóstico Ejecutivo</div>
    <h1>Test de dominio<br><span class="hl">de inteligencia artificial</span></h1>
    <p>17 preguntas. 5 minutos. Una lectura ejecutiva de tu nivel real de adopción de IA, calibrada por STANNUM. Tu resultado es el punto de partida rumbo al encuentro <b style="color:#fff">${CONFIG.EVENT}</b>.</p>
    <button class="btn-big" id="start">Comenzar diagnóstico</button>
    <div class="meta"><span>17 preguntas</span><span>~5 minutos</span><span>Resultado inmediato</span></div>
  </section>`;
  document.getElementById('start').onclick = ()=>{ step=0; render(); };
  setProgress();
}

function renderQuestion(){
  const q = QUESTIONS[step];
  const a = answers[q.id];
  let body = '';

  if(q.type==='text'){
    body = `<div class="field"><input id="inp" type="${q.email?'email':'text'}" placeholder="${q.ph}" value="${a?escapeHtml(a):''}" autocomplete="off"/></div>`;
  } else if(q.type==='chips'){
    body = `<div class="chips">` + q.opts.map(o=>{
      const sel = q.multi ? (Array.isArray(a)&&a.includes(o)) : (a===o);
      return `<div class="chip ${sel?'sel':''}" data-v="${escapeHtml(o)}">${o}</div>`;
    }).join('') + `</div>`;
  } else if(q.type==='cards'){
    body = `<div class="cards">` + q.opts.map(o=>{
      const sel = a===o.l;
      return `<div class="card ${sel?'sel':''}" data-v="${escapeHtml(o.l)}"><div class="card-l">${o.l}</div><div class="card-s">${o.s}</div></div>`;
    }).join('') + `</div>`;
  }

  const skip = q.opt ? `<button class="btn-skip" id="skip">Omitir</button>` : '';
  app.innerHTML = `
  <section class="stage fade">
    <div class="eyebrow">${q.eye} <span class="q-index">${String(step+1).padStart(2,'0')} / ${QUESTIONS.length}</span></div>
    <h1 class="q-title">${heading(q)}</h1>
    ${body}
    <div class="nav-row">
      <button class="back" id="back" ${step===0?'style="visibility:hidden"':''}>← Atrás</button>
      <div class="nav-actions">${skip}<button class="btn" id="next" disabled>Continuar</button></div>
    </div>
  </section>`;

  const nextBtn = document.getElementById('next');
  const validate = ()=>{ nextBtn.disabled = !isAnswered(q); };

  if(q.type==='text'){
    const inp = document.getElementById('inp');
    inp.focus();
    inp.addEventListener('input', ()=>{ answers[q.id]=inp.value.trim(); validate(); });
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && !nextBtn.disabled) goNext(); });
  } else {
    app.querySelectorAll('[data-v]').forEach(el=>{
      el.onclick = ()=>{
        const v = el.getAttribute('data-v');
        if(q.multi){
          let arr = Array.isArray(answers[q.id]) ? answers[q.id].slice() : [];
          if(arr.includes(v)) arr = arr.filter(x=>x!==v); else arr.push(v);
          answers[q.id]=arr; el.classList.toggle('sel');
        } else {
          answers[q.id]=v;
          app.querySelectorAll('[data-v]').forEach(x=>x.classList.remove('sel'));
          el.classList.add('sel');
        }
        validate(); setProgress();
      };
    });
  }
  validate();
  document.getElementById('back').onclick = goBack;
  nextBtn.onclick = goNext;
  if(skip) document.getElementById('skip').onclick = ()=>{ answers[q.id]=answers[q.id]||''; goNext(); };
  setProgress();
}

function heading(q){
  const name = (answers.name||'').split(/\s+/)[0];
  if(name && q.id!=='name') return `<span class="hl">${escapeHtml(name)},</span> ${lower(q.q)}`;
  return q.q;
}
function lower(s){ return s.charAt(0).toLowerCase()+s.slice(1); }

function isAnswered(q){
  const a = answers[q.id];
  if(q.opt) return true;
  if(q.multi) return Array.isArray(a) && a.length>0;
  if(q.email) return /.+@.+\..+/.test(a||'');
  return a!=null && String(a).trim()!=='';
}

function goNext(){ if(step < QUESTIONS.length-1){ step++; render(); } else renderCalc(); }
function goBack(){ if(step>0){ step--; render(); } else { step=-1; render(); } }

function renderCalc(){
  app.innerHTML = `<section class="stage calc fade"><div class="ring"></div><h2>Procesando tu diagnóstico…</h2><p>Calibrando tu nivel de dominio de IA</p></section>`;
  progressBar.style.width='100%';
  submit();
  setTimeout(renderResult, 1500);
}

function renderResult(){
  const score = liveScore();
  const lv = levelFor(score);
  const name = (answers.name||'').split(/\s+/)[0]||'';
  let cta;
  if(CONFIG.WHATSAPP){
    const msg = encodeURIComponent(`Hola STANNUM, soy ${answers.name||''} (${answers.company||''}). Hice el Test de Dominio IA, nivel ${lv.name} (${score}/100). Quiero solicitar mi lugar en ${CONFIG.EVENT}.`);
    cta = `<a class="wa-btn" href="https://wa.me/${CONFIG.WHATSAPP}?text=${msg}" target="_blank" rel="noopener">Confirmar mi lugar por WhatsApp →</a>`;
  } else {
    cta = `<div class="ok-badge">Solicitud registrada</div>`;
  }
  app.innerHTML = `
  <section class="stage result fade">
    <div class="res-head"><div class="eyebrow">Tu diagnóstico${name?` · ${escapeHtml(name)}`:''}</div></div>
    <div class="gauge-wrap">${gauge(score)}</div>
    <div class="level-name">Nivel <span class="hl">${lv.name}</span></div>
    <div class="level-tag">${lv.tag}</div>

    <div class="res-card"><div class="k">Lectura ejecutiva</div><div class="res-desc">${lv.desc}</div></div>
    <div class="res-card"><div class="k">Solución STANNUM recomendada</div><div class="sol-name">${lv.sol}</div><div class="sol-d">${lv.solD}</div></div>
    <div class="res-card"><div class="k">Tus dimensiones</div><div class="bars" id="bars"></div>
      <div class="src">Marco de referencia: Microsoft, Work Trend Index 2025 (FRONTIER FIRM).</div></div>

    <div class="cta-final">
      <h3>Tu lugar en <span class="hl">${CONFIG.EVENT}</span></h3>
      <p>Recibimos tu solicitud y tu diagnóstico. El equipo de STANNUM te contacta para confirmar tu lugar. Cupo limitado.</p>
      ${cta}
      <div class="email-note">Te enviamos el diagnóstico a <b>${escapeHtml(answers.email||'tu email')}</b> · Consultas: <b>${CONFIG.EMAIL}</b></div>
    </div>
  </section>`;

  const dims = dimensions();
  const bars = document.getElementById('bars');
  bars.innerHTML = dims.map(d=>`<div class="bar-row"><div class="bl"><span>${d.label}</span><span>${d.val}%</span></div><div class="bar-track"><div class="bar-fill" data-w="${d.val}"></div></div></div>`).join('');
  requestAnimationFrame(()=>setTimeout(()=>{ bars.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.getAttribute('data-w')+'%'); },120));
  window.scrollTo({top:0});
}

function dimensions(){
  const val=id=>{ const q=QUESTIONS.find(x=>x.id===id); const o=q.opts.find(o=>o.l===answers[id]); return o?o.v:0; };
  return [
    {label:"Frecuencia de uso", val:val('freq')},
    {label:"Método y prompting", val:val('reaccion')},
    {label:"Integración en el equipo", val:val('integracion')},
    {label:"Autopercepción de dominio", val:val('nivel')}
  ];
}

function gauge(score){
  const cx=150, cy=150, r=120, start=180, end=180+(score/100)*180;
  const pol=deg=>{ const a=deg*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  const [x1,y1]=pol(180), [x2,y2]=pol(360), [px,py]=pol(end);
  const large=(end-start)>180?1:0;
  return `<div class="gauge"><svg viewBox="0 0 300 170">
    <path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="14" stroke-linecap="round"/>
    <path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${px} ${py}" fill="none" stroke="#c58b31" stroke-width="14" stroke-linecap="round"/>
  </svg><div class="num"><b>${score}</b><small>/ 100</small></div></div>`;
}

// ====================== SUBMIT ======================
function submit(){
  const score = liveScore();
  const lv = levelFor(score);
  const payload = {
    id:'iaw-'+Date.now(), date:new Date().toISOString(), source:'landing-ia-wine-test', event:CONFIG.EVENT,
    name:answers.name||'', company:answers.company||'', role:answers.role||'', email:answers.email||'', phone:answers.phone||'',
    team:answers.team||'', time:answers.time||'', plats:answers.plats||[], pago:answers.pago||'',
    areas:answers.areas||[], reaccion:answers.reaccion||'', integracion:answers.integracion||'',
    funciones:answers.funciones||[], conceptos:answers.conceptos||[], aprender:answers.aprender||[],
    freq:answers.freq||'', autonivel:answers.nivel||'',
    score:score, levelN:lv.n, levelName:lv.name, solution:lv.sol
  };
  try{
    const prev = JSON.parse(localStorage.getItem('stannum:iawine:subs')||'[]');
    prev.push(payload); localStorage.setItem('stannum:iawine:subs', JSON.stringify(prev));
    localStorage.setItem('stannum:iawine:last', JSON.stringify(payload));
  }catch(e){}
  if(CONFIG.APPS_SCRIPT_URL){
    fetch(CONFIG.APPS_SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)}).catch(()=>{});
  }
}

// ====================== UTILS ======================
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function render(){ if(step<0) renderSplash(); else renderQuestion(); }
render();
</script>
